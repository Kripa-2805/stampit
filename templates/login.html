<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="login-page">
    <canvas id="bg-canvas"></canvas>

    <div class="main-container">

        <!-- LOGO: horizontal row, sits above card -->
        <div class="login-logo">
            <img src="{{ url_for('static', filename='assets/stampit-logo.png') }}" alt="StampIt" style="height: 36px;">
        </div>

        <div class="auth-wrapper" id="wrapper">

            <!-- SIGN IN FORM — left half -->
            <div class="form-container sign-in-container">
                <form action="/login" method="POST">
                    <div class="form-group">
                        <label>USERNAME</label>
                        <input type="text" name="username" required placeholder="Enter your ID">
                    </div>
                    <div class="form-group">
                        <label>PASSWORD</label>
                        <div class="input-wrapper">
                            <input type="password" name="password" id="signin-password" required placeholder="••••••••">
                            <button type="button" class="eye-toggle" onclick="togglePassword('signin-password', this)">
                                <i data-lucide="eye" style="width:18px;height:18px;"></i>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary" style="margin-top:18px;">ACCESS STAMPIT</button>
                </form>
            </div>

            <!-- SIGN UP FORM — right half, hidden initially -->
            <div class="form-container sign-up-container">
                <form action="/signup" method="POST">
                    <div class="form-group">
                        <label>FULL NAME</label>
                        <input type="text" name="fullname" required placeholder="Your Name">
                    </div>
                    <div class="form-group">
                        <label>EMAIL</label>
                        <input type="email" name="email" required placeholder="email@stampit.com">
                    </div>
                    <div class="form-group">
                        <label>CREATE KEY</label>
                        <div class="input-wrapper">
                            <input type="password" name="password" id="signup-password" required placeholder="••••••••">
                            <button type="button" class="eye-toggle" onclick="togglePassword('signup-password', this)">
                                <i data-lucide="eye" style="width:18px;height:18px;"></i>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary" style="margin-top:18px;">JOIN STAMPIT</button>
                </form>
            </div>

            <!-- TOGGLE PANEL — slides as curtain -->
            <div class="toggle-panel">
                <div class="toggle-content">
                    <h2 id="toggle-title">New Here?</h2>
                    <p id="toggle-text">Join the most secure authentication network on the planet.</p>
                </div>
                <button class="btn btn-outline" id="toggle-btn">CREATE ACCOUNT</button>
            </div>

        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        const particles = Array.from({length: 60}, () => ({
            x: Math.random() * canvas.width, y: Math.random() * canvas.height,
            r: Math.random() * 1.5 + 0.5, dx: (Math.random() - 0.5) * 0.4, dy: (Math.random() - 0.5) * 0.4,
            color: Math.random() > 0.5 ? 'rgba(0,242,255,0.5)' : 'rgba(255,184,77,0.4)'
        }));
        function animateBg() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = p.color; ctx.fill();
                p.x += p.dx; p.y += p.dy;
                if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
            });
            requestAnimationFrame(animateBg);
        }
        animateBg();
        lucide.createIcons();

        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';
            btn.innerHTML = isPassword
                ? '<i data-lucide="eye-off" style="width:18px;height:18px;"></i>'
                : '<i data-lucide="eye" style="width:18px;height:18px;"></i>';
            lucide.createIcons();
        }

        const wrapper = document.getElementById('wrapper');
        const toggleBtn = document.getElementById('toggle-btn');
        toggleBtn.addEventListener('click', () => {
            wrapper.classList.toggle('active');
            const isActive = wrapper.classList.contains('active');
            document.getElementById('toggle-title').innerText = isActive ? "Already a Member?" : "New Here?";
            document.getElementById('toggle-text').innerText = isActive
                ? "Enter your credentials to access your secure StampIt identity."
                : "Join the most secure authentication network on the planet.";
            toggleBtn.innerText = isActive ? "SIGN IN" : "CREATE ACCOUNT";
        });
    </script>
</body>
</html>
